spring:
  application:
    name: coreflow
  datasource:
    url: jdbc:postgresql://localhost:5432/coreflow
    username: coreflow
    password: coreflow
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
